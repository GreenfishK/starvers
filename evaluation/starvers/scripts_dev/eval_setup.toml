[general]
    snapshot_dir = "alldata.IC.nt"
    change_sets_dir = "alldata.CB_computed"

[evaluations]
    [evaluations.graphdb]
        bearb_day   = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        bearb_hour = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        bearc      = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        orkg       = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]

    [evaluations.jenatdb2]
        bearb_day   = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        bearb_hour = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        bearc      = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]
        orkg       = ["ic_sr_ng", "tb_sr_ng", "tb_sr_rs"]

    [evaluations.ostrich]
        bearb_day   = ["ostrich"]
        bearb_hour = ["ostrich"]
        bearc      = ["ostrich"]
        orkg       = ["ostrich"]

[rdf_stores]
    graphdb = {get = "http://Starvers:7200/repositories/{repo}", post = "http://Starvers:7200/repositories/{repo}/statements", mgmt_script = "/starvers_eval/scripts/triple_store_mgmt/graphdb_mgmt.sh", dry_run_query = "select ?s ?p ?o {?s ?p ?o .} limit 10"}
    jenatdb2 = {get = "http://Starvers:3030/{repo}/sparql", post = "http://Starvers:7200/{repo}/update", mgmt_script = "/starvers_eval/scripts/triple_store_mgmt/jenatdb2_mgmt.sh", dry_run_query = "select ?s ?p ?o {?s ?p ?o .} limit 10"}
    ostrich = {get = "http://Starvers:42564/sparql", post = "http://Starvers:42564/update", mgmt_script = "/starvers_eval/scripts/triple_store_mgmt/ostrich_mgmt.sh", dry_run_query = "select ?s ?p ?o {GRAPH <version:0> {?s ?p ?o .}} limit 10"}


[datasets]
    [datasets.beara]
        snapshot_versions = 58
        ic_basename_length = 1
        superset = "beara"
        download_link_snapshots = "https://aic.ai.wu.ac.at/qadlod/bear/BEAR_A/datasets/IC/alldata.IC.nt.tar.gz"
        archive_name_snapshots = "alldata.IC.nt.tar.gz"
        download_link_ng_dataset = "https://aic.ai.wu.ac.at/qadlod/bear/BEAR_A/datasets/TB/alldata.TB.nq.gz"
        archive_name_ng_dataset =  "alldata.TB.nq.gz"
        yn_nested_archives = "false"
        [datasets.beara.repositories]
            ic_sr_ng = 1
            cb_sr_ng = 1
            tb_sr_ng = 1
            tb_sr_rs = 1
            ostrich = 1
        [datasets.beara.query_sets]
            [datasets.beara.query_sets.high]
                [datasets.beara.query_sets.high.policies]
                    ic_sr_ng = {versions = 58, template = "ic_sr_ng/ts"}
                    cb_sr_ng = {versions = 58, template = "cb_sr_ng/ts"}
